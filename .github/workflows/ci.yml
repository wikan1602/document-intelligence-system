name: CI Code Quality & Unit Tests

on:
  push:
    branches: [ main, master, development ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      # Jalankan PostgreSQL container dengan pgvector untuk unit testing
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: docint_test
          POSTGRES_PASSWORD: secret_test
          POSTGRES_DB: document_intelligence_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docint_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements.txt

      - name: Run Ruff Linter & Formatter Check
        run: |
          ruff check app/
          ruff format --check app/

      - name: Execute Test Suite via Pytest
        env:
          DATABASE_URL: postgresql://docint_test:secret_test@localhost:5432/document_intelligence_test
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pytest tests/ -v