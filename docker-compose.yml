version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: doc_intel_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: document_intelligence
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d document_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: